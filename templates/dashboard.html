<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}}</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ------------------------------------------------------------------ */
      /* Design tokens — all contrast-sensitive values live here.            */
      /* JS updates these whenever the background gradient changes.          */
      /* ------------------------------------------------------------------ */
      :root {
        /* Background gradient */
        --bg1: #2c3928;
        --bg2: #1b2619;
        --bg-angle: 135deg;

        /* Contrast-aware text & UI tones (dark-bg defaults) */
        --text-primary:       rgba(255, 255, 255, 0.88);
        --text-secondary:     rgba(255, 255, 255, 0.52);
        --tile-hover-bg:      rgba(255, 255, 255, 0.07);
        --tile-active-bg:     rgba(255, 255, 255, 0.12);
        --icon-box-bg:        rgba(0,   0,   0,   0.30);
        --add-border:         rgba(255, 255, 255, 0.20);
        --add-border-hover:   rgba(255, 255, 255, 0.40);
        --drag-outline:       rgba(255, 255, 255, 0.28);
        --focus-ring:         rgba(255, 255, 255, 0.45);
      }

      body {
        background: linear-gradient(var(--bg-angle), var(--bg1), var(--bg2));
        background-attachment: fixed;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px 72px;
        gap: 28px;
      }

      /* ------------------------------------------------------------------ */
      /* Page title                                                           */
      /* ------------------------------------------------------------------ */

      .site-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-secondary);
        user-select: none;
        transition: color 0.35s ease;
      }

      /* ------------------------------------------------------------------ */
      /* Shortcut grid                                                        */
      /* ------------------------------------------------------------------ */

      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        width: min(800px, 100%);
        justify-content: flex-start;
      }

      /* ------------------------------------------------------------------ */
      /* Individual tile                                                      */
      /* ------------------------------------------------------------------ */

      .tile {
        position: relative;
        width: 108px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 7px;
        padding: 12px 6px 10px;
        border-radius: 14px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        /* background intentionally unset so hover var takes over */
        transition: background 0.15s ease;
        outline: none;
      }

      .tile:hover        { background: var(--tile-hover-bg); }
      .tile.drag-target  {
        background: var(--tile-active-bg);
        outline: 2px dashed var(--drag-outline);
        outline-offset: -2px;
      }
      .tile.is-dragging  { opacity: 0.25; }

      .tile:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 2px;
      }

      /* ------------------------------------------------------------------ */
      /* App-icon squircle box                                               */
      /* ------------------------------------------------------------------ */

      .icon-box {
        width: 64px;
        height: 64px;
        /* ~22% border-radius = iOS squircle shape */
        border-radius: 14px;
        background: var(--icon-box-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
      }

      .tile:hover .icon-box {
        transform: scale(1.08);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.32);
      }

      /* Favicon image — padded inside the squircle */
      .icon-img {
        width:  40px;
        height: 40px;
        object-fit: contain;
        display: block;
        flex-shrink: 0;
      }

      /* Letter fallback — shown before (or instead of) the favicon */
      .icon-letter {
        font-size: 26px;
        font-weight: 700;
        /* Always white because the squircle bg is always a saturated colour */
        color: rgba(255, 255, 255, 0.90);
        line-height: 1;
        user-select: none;
      }

      /* ------------------------------------------------------------------ */
      /* Tile label                                                           */
      /* ------------------------------------------------------------------ */

      .tile-name {
        font-size: 11.5px;
        color: var(--text-secondary);
        text-align: center;
        max-width: 96px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        line-height: 1;
        transition: color 0.35s ease;
      }

      .tile:hover .tile-name { color: var(--text-primary); }

      /* ------------------------------------------------------------------ */
      /* Tile action buttons                                                  */
      /* ------------------------------------------------------------------ */

      .tile-actions {
        position: absolute;
        top: 6px;
        right: 6px;
        display: flex;
        gap: 3px;
        opacity: 0;
        transition: opacity 0.14s ease;
        z-index: 2;
      }

      .tile:hover .tile-actions { opacity: 1; }

      .tile-btn {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 700;
        padding: 0;
        line-height: 1;
        flex-shrink: 0;
        transition: filter 0.12s, transform 0.1s;
      }

      .tile-btn:hover { filter: brightness(1.2); transform: scale(1.12); }

      .btn-edit   { background: rgba(80,  160, 255, 0.88); color: #fff; }
      .btn-delete { background: rgba(255,  65,  65, 0.88); color: #fff; }

      .btn-lock {
        background: rgba(128, 128, 128, 0.25);
        color: rgba(255, 255, 255, 0.45);
        cursor: default;
        position: relative;
      }
      .btn-lock:hover { filter: none; transform: none; }

      .lock-tooltip {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        background: #1a1c18;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.78);
        font-size: 11px;
        font-weight: 400;
        line-height: 1.5;
        padding: 7px 10px;
        border-radius: 9px;
        width: 195px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        text-align: left;
        z-index: 20;
      }

      .btn-lock:hover .lock-tooltip { opacity: 1; }

      /* ------------------------------------------------------------------ */
      /* Add tile                                                             */
      /* ------------------------------------------------------------------ */

      .tile-add {
        color: var(--text-secondary);
        cursor: pointer;
        gap: 7px;
        transition: background 0.15s, color 0.35s;
      }

      .tile-add:hover {
        background: var(--tile-hover-bg);
        color: var(--text-primary);
      }

      .add-box {
        width: 64px;
        height: 64px;
        border-radius: 14px;
        border: 2px dashed var(--add-border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 300;
        transition: border-color 0.15s;
        color: inherit;
      }

      .tile-add:hover .add-box { border-color: var(--add-border-hover); }

      .add-label {
        font-size: 11.5px;
        color: inherit;
      }

      /* ------------------------------------------------------------------ */
      /* Background gradient picker — trigger button                         */
      /* ------------------------------------------------------------------ */

      .bg-trigger {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 42px;
        height: 42px;
        border-radius: 11px;
        border: 1.5px solid rgba(255, 255, 255, 0.22);
        cursor: pointer;
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.38);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        padding: 0;
        overflow: hidden;
        z-index: 40;
      }

      .bg-trigger:hover {
        transform: scale(1.08);
        box-shadow: 0 4px 22px rgba(0, 0, 0, 0.5);
        border-color: rgba(255, 255, 255, 0.38);
      }

      .bg-trigger-icon {
        font-size: 18px;
        line-height: 1;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
        pointer-events: none;
      }

      /* ------------------------------------------------------------------ */
      /* Background picker panel                                             */
      /* ------------------------------------------------------------------ */

      .bg-panel {
        position: fixed;
        bottom: 72px;
        right: 18px;
        width: 272px;
        background: rgba(22, 24, 20, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        z-index: 50;
        animation: fadeUp 0.18s ease;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0)    scale(1);    }
      }

      .bg-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 13px;
      }

      .bg-panel-title {
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.42);
        text-transform: uppercase;
        letter-spacing: 0.10em;
      }

      .bg-panel-close {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.32);
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.12s;
      }
      .bg-panel-close:hover { color: rgba(255, 255, 255, 0.72); }

      .bg-presets {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 5px;
        margin-bottom: 14px;
      }

      .preset-swatch {
        height: 22px;
        border-radius: 6px;
        cursor: pointer;
        border: 1.5px solid transparent;
        transition: transform 0.12s, border-color 0.12s;
        padding: 0;
      }

      .preset-swatch:hover  { transform: scale(1.15); }
      .preset-swatch.active { border-color: rgba(255, 255, 255, 0.65); }

      .bg-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.07);
        margin: 12px 0;
      }

      .color-field {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .color-field-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.36);
        width: 22px;
        flex-shrink: 0;
        text-align: right;
      }

      .color-swatch-wrap {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        border: 1.5px solid rgba(255, 255, 255, 0.14);
        overflow: hidden;
        flex-shrink: 0;
        position: relative;
        cursor: pointer;
        transition: border-color 0.12s;
      }

      .color-swatch-wrap:hover { border-color: rgba(255, 255, 255, 0.32); }

      .color-picker-hidden {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        padding: 0;
        margin: 0;
        border: none;
      }

      .color-hex {
        flex: 1;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 7px;
        padding: 6px 9px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        font-family: ui-monospace, "SF Mono", "Fira Code", Consolas, monospace;
        outline: none;
        transition: border-color 0.13s;
        width: 100%;
      }

      .color-hex:focus { border-color: rgba(100, 180, 255, 0.45); }

      .angle-section { margin-top: 12px; }

      .angle-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.36);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      .angle-row { display: flex; gap: 4px; }

      .angle-btn {
        flex: 1;
        padding: 7px 2px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        color: rgba(255, 255, 255, 0.48);
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }

      .angle-btn:hover {
        background: rgba(255, 255, 255, 0.11);
        color: rgba(255, 255, 255, 0.82);
      }

      .angle-btn.active {
        background: rgba(100, 180, 255, 0.18);
        border-color: rgba(100, 180, 255, 0.40);
        color: rgba(255, 255, 255, 0.92);
      }

      /* ------------------------------------------------------------------ */
      /* Add / Edit modal                                                     */
      /* ------------------------------------------------------------------ */

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.50);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        padding: 20px;
      }

      .modal {
        background: #1e2119;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 18px;
        padding: 28px 28px 24px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.60);
        animation: modalIn 0.2s ease;
      }

      @keyframes modalIn {
        from { opacity: 0; transform: scale(0.95) translateY(8px); }
        to   { opacity: 1; transform: scale(1)    translateY(0);   }
      }

      .modal-title {
        font-size: 17px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 20px;
      }

      .field-label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.38);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .field-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 9px;
        padding: 10px 13px;
        color: #fff;
        font-size: 14px;
        margin-bottom: 16px;
        outline: none;
        font-family: inherit;
        transition: border-color 0.13s, background 0.13s;
      }

      .field-input::placeholder { color: rgba(255, 255, 255, 0.20); }
      .field-input:focus {
        border-color: rgba(80, 160, 255, 0.52);
        background: rgba(255, 255, 255, 0.08);
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 4px;
      }

      .modal-btn {
        padding: 9px 22px;
        border-radius: 9px;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: filter 0.13s;
      }

      .modal-btn:hover:not(:disabled) { filter: brightness(1.12); }
      .modal-btn:disabled { opacity: 0.45; cursor: not-allowed; }

      .btn-cancel { background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.65); }
      .btn-save   { background: #3a7aff; color: #fff; }

      /* ------------------------------------------------------------------ */
      /* Delete confirm                                                       */
      /* ------------------------------------------------------------------ */

      .confirm-dialog {
        background: #1e2119;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 18px;
        padding: 26px 28px;
        width: 100%;
        max-width: 320px;
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.60);
        animation: modalIn 0.15s ease;
        text-align: center;
      }

      .confirm-dialog p {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.78);
        margin-bottom: 20px;
        line-height: 1.45;
      }

      .confirm-dialog strong { color: #fff; }
      .confirm-actions { display: flex; gap: 10px; justify-content: center; }
      .btn-confirm-del { background: #dc3030; color: #fff; }

      /* ------------------------------------------------------------------ */
      /* Toast                                                                */
      /* ------------------------------------------------------------------ */

      .toast {
        position: fixed;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%) translateY(14px);
        background: rgba(22, 24, 20, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.88);
        padding: 9px 18px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 450;
        box-shadow: 0 4px 22px rgba(0, 0, 0, 0.45);
        pointer-events: none;
        z-index: 200;
        opacity: 0;
        transition: opacity 0.22s, transform 0.22s;
        white-space: nowrap;
      }

      .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ------------------------------------------------------------------ */
      /* Responsive                                                           */
      /* ------------------------------------------------------------------ */

      @media (max-width: 520px) {
        .tile { width: 88px; }
        .icon-box, .add-box { width: 56px; height: 56px; }
        .icon-img { width: 34px; height: 34px; }
        .bg-panel { right: 10px; left: 10px; width: auto; }
      }
    </style>
  </head>
  <body>

    <p class="site-title">{{.Title}}</p>

    <div class="grid" id="grid" role="list" aria-label="Shortcuts"></div>

    <!-- ------------------------------------------------------------------ -->
    <!-- Background picker trigger + panel                                   -->
    <!-- ------------------------------------------------------------------ -->
    <button class="bg-trigger" id="bgTrigger" title="Background" aria-label="Change background">
      <span class="bg-trigger-icon">🎨</span>
    </button>

    <div class="bg-panel" id="bgPanel" style="display:none">
      <div class="bg-panel-header">
        <span class="bg-panel-title">Background</span>
        <button class="bg-panel-close" id="bgPanelClose" aria-label="Close">✕</button>
      </div>

      <div class="bg-presets" id="bgPresets"></div>
      <div class="bg-divider"></div>

      <div class="color-field">
        <span class="color-field-label">From</span>
        <div class="color-swatch-wrap" id="swatch1">
          <input type="color" class="color-picker-hidden" id="picker1" />
        </div>
        <input type="text" class="color-hex" id="hex1" maxlength="7" spellcheck="false" />
      </div>

      <div class="color-field">
        <span class="color-field-label">To</span>
        <div class="color-swatch-wrap" id="swatch2">
          <input type="color" class="color-picker-hidden" id="picker2" />
        </div>
        <input type="text" class="color-hex" id="hex2" maxlength="7" spellcheck="false" />
      </div>

      <div class="angle-section">
        <div class="angle-label">Direction</div>
        <div class="angle-row" id="angleRow">
          <button class="angle-btn" data-angle="45"  title="45°">↗</button>
          <button class="angle-btn" data-angle="90"  title="90°">→</button>
          <button class="angle-btn" data-angle="135" title="135°">↘</button>
          <button class="angle-btn" data-angle="180" title="180°">↓</button>
        </div>
      </div>
    </div>

    <!-- ------------------------------------------------------------------ -->
    <!-- Add / Edit modal                                                     -->
    <!-- ------------------------------------------------------------------ -->
    <div class="modal-overlay" id="editModal" style="display:none" aria-modal="true" role="dialog">
      <div class="modal">
        <p class="modal-title" id="modalTitle">Add Shortcut</p>
        <label class="field-label" for="inputName">Name</label>
        <input class="field-input" type="text" id="inputName" placeholder="e.g. GitHub"          autocomplete="off" spellcheck="false" />
        <label class="field-label" for="inputUrl">URL</label>
        <input class="field-input" type="url"  id="inputUrl"  placeholder="https://example.com"  autocomplete="off" spellcheck="false" />
        <div class="modal-actions">
          <button class="modal-btn btn-cancel" id="btnCancel">Cancel</button>
          <button class="modal-btn btn-save"   id="btnSave">Add</button>
        </div>
      </div>
    </div>

    <!-- ------------------------------------------------------------------ -->
    <!-- Delete confirm                                                       -->
    <!-- ------------------------------------------------------------------ -->
    <div class="modal-overlay" id="confirmModal" style="display:none" aria-modal="true" role="dialog">
      <div class="confirm-dialog">
        <p>Delete <strong id="confirmName"></strong>?</p>
        <div class="confirm-actions">
          <button class="modal-btn btn-cancel"      id="btnConfirmCancel">Cancel</button>
          <button class="modal-btn btn-confirm-del" id="btnConfirmDel">Delete</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      /* ================================================================== */
      /* Server-embedded state                                               */
      /* ================================================================== */
      let shortcuts = {{.ShortcutsJSON}};
      let settings  = {{.SettingsJSON}};

      /* ================================================================== */
      /* Contrast / luminance helpers                                        */
      /* Implements WCAG relative-luminance to decide text colour.          */
      /* ================================================================== */

      /** sRGB channel [0,255] → linear light */
      function toLinear(c) {
        const v = c / 255;
        return v <= 0.03928 ? v / 12.92 : ((v + 0.055) / 1.055) ** 2.4;
      }

      /** WCAG 2.1 relative luminance of a #rrggbb hex string */
      function luminance(hex) {
        if (!hex || hex.length < 7) return 0;
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
      }

      /**
       * Recompute all contrast-sensitive CSS custom properties on :root
       * whenever the background gradient changes.
       *
       * We average the luminance of both gradient stops; anything below the
       * WCAG threshold (~0.184) is treated as a "dark" background and gets
       * light text, otherwise dark text.
       */
      function updateContrast(c1, c2) {
        const lum    = (luminance(c1) + luminance(c2)) / 2;
        const dark   = lum < 0.184;   // WCAG white-text threshold
        const r = document.documentElement;

        if (dark) {
          r.style.setProperty('--text-primary',     'rgba(255,255,255,0.88)');
          r.style.setProperty('--text-secondary',   'rgba(255,255,255,0.52)');
          r.style.setProperty('--tile-hover-bg',    'rgba(255,255,255,0.07)');
          r.style.setProperty('--tile-active-bg',   'rgba(255,255,255,0.12)');
          r.style.setProperty('--icon-box-bg',      'rgba(0,0,0,0.30)');
          r.style.setProperty('--add-border',       'rgba(255,255,255,0.20)');
          r.style.setProperty('--add-border-hover', 'rgba(255,255,255,0.40)');
          r.style.setProperty('--drag-outline',     'rgba(255,255,255,0.28)');
          r.style.setProperty('--focus-ring',       'rgba(255,255,255,0.45)');
        } else {
          r.style.setProperty('--text-primary',     'rgba(0,0,0,0.80)');
          r.style.setProperty('--text-secondary',   'rgba(0,0,0,0.45)');
          r.style.setProperty('--tile-hover-bg',    'rgba(0,0,0,0.06)');
          r.style.setProperty('--tile-active-bg',   'rgba(0,0,0,0.11)');
          r.style.setProperty('--icon-box-bg',      'rgba(0,0,0,0.12)');
          r.style.setProperty('--add-border',       'rgba(0,0,0,0.20)');
          r.style.setProperty('--add-border-hover', 'rgba(0,0,0,0.38)');
          r.style.setProperty('--drag-outline',     'rgba(0,0,0,0.25)');
          r.style.setProperty('--focus-ring',       'rgba(0,0,0,0.35)');
        }
      }

      /* ================================================================== */
      /* Favicon + letter helpers                                            */
      /* ================================================================== */

      /**
       * Favicon resolution is handled server-side at /api/favicon.
       * The server tries /favicon.ico → HTML <link> parsing → Google (public only).
       * A 404 means no icon was found; img.onerror keeps the letter squircle.
       */
      function faviconUrl(url) {
        return '/api/favicon?url=' + encodeURIComponent(url);
      }

      /*
       * Deterministic, saturated palette for letter-fallback squircles.
       * Chosen to stand out on any dark gradient background.
       */
      const SQUIRCLE_COLORS = [
        '#4a72b8', '#8a52c8', '#c85272', '#c88a42',
        '#42b88a', '#4278c8', '#88b842', '#7842c8',
      ];

      function squircleColor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = Math.imul(31, h) + name.charCodeAt(i) | 0;
        return SQUIRCLE_COLORS[Math.abs(h) % SQUIRCLE_COLORS.length];
      }

      /* ================================================================== */
      /* Grid                                                                */
      /* ================================================================== */

      let dragSrcId = null;

      function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        shortcuts.forEach(sc => grid.appendChild(buildTile(sc)));

        const add = document.createElement('div');
        add.className = 'tile tile-add';
        add.setAttribute('role', 'button');
        add.setAttribute('tabindex', '0');
        add.setAttribute('aria-label', 'Add shortcut');
        add.innerHTML = '<div class="add-box">+</div><span class="add-label">Add shortcut</span>';
        add.addEventListener('click', openAdd);
        add.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openAdd(); });
        grid.appendChild(add);
      }

      function buildTile(sc) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.id = sc.id;
        tile.setAttribute('role', 'listitem');
        tile.setAttribute('tabindex', '0');
        tile.setAttribute('aria-label', sc.name);
        tile.draggable = true;

        /* ----- Squircle icon box ----- */
        const box = document.createElement('div');
        box.className = 'icon-box';

        /*
         * Start with the letter inside a coloured squircle.
         * The box's inline background overrides the CSS var so the colour
         * is specific to this shortcut.  When the favicon loads successfully,
         * we clear the inline style so the CSS var (--icon-box-bg) takes over
         * and add the padded image.
         */
        const ltr = document.createElement('span');
        ltr.className = 'icon-letter';
        ltr.textContent = (sc.name || '?')[0].toUpperCase();
        box.style.background = squircleColor(sc.name);
        box.appendChild(ltr);

        const furl = faviconUrl(sc.url);
        if (furl) {
          const img = new Image();
          img.addEventListener('load', () => {
            // Server returns 404 when no icon is found, so any image that
            // loads here is a real favicon — swap out the letter squircle.
            box.innerHTML = '';
            box.style.background = '';   // revert to CSS var --icon-box-bg
            img.className = 'icon-img';
            img.alt = '';
            box.appendChild(img);
          });
          // On 404 / network error img.onerror fires; letter squircle stays.
          img.src = furl;
        }

        /* ----- Label ----- */
        const name = document.createElement('span');
        name.className = 'tile-name';
        name.textContent = sc.name;

        /* ----- Action buttons ----- */
        const actions = document.createElement('div');
        actions.className = 'tile-actions';

        if (sc.hardcoded) {
          const lock = document.createElement('button');
          lock.className = 'tile-btn btn-lock';
          lock.setAttribute('aria-label', 'Built-in shortcut');
          lock.innerHTML = '&#x1F512;';
          const tip = document.createElement('span');
          tip.className = 'lock-tooltip';
          tip.textContent = 'Built-in shortcut — edit config.json to modify or remove it.';
          lock.appendChild(tip);
          actions.appendChild(lock);
        } else {
          const edit = document.createElement('button');
          edit.className = 'tile-btn btn-edit';
          edit.setAttribute('aria-label', 'Edit ' + sc.name);
          edit.textContent = '✎';
          edit.addEventListener('click', e => { e.stopPropagation(); openEdit(sc.id); });

          const del = document.createElement('button');
          del.className = 'tile-btn btn-delete';
          del.setAttribute('aria-label', 'Delete ' + sc.name);
          del.textContent = '✕';
          del.addEventListener('click', e => { e.stopPropagation(); openConfirm(sc.id, sc.name); });

          actions.appendChild(edit);
          actions.appendChild(del);
        }

        tile.appendChild(box);
        tile.appendChild(name);
        tile.appendChild(actions);

        tile.addEventListener('click',   () => window.open(sc.url, '_blank', 'noopener'));
        tile.addEventListener('keydown', e => { if (e.key === 'Enter') window.open(sc.url, '_blank', 'noopener'); });

        tile.addEventListener('dragstart', onDragStart);
        tile.addEventListener('dragover',  onDragOver);
        tile.addEventListener('dragleave', onDragLeave);
        tile.addEventListener('drop',      onDrop);
        tile.addEventListener('dragend',   onDragEnd);

        return tile;
      }

      /* ================================================================== */
      /* Drag-and-drop                                                       */
      /* ================================================================== */

      function onDragStart(e) {
        dragSrcId = e.currentTarget.dataset.id;
        e.currentTarget.classList.add('is-dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragSrcId);
      }

      function onDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const t = e.currentTarget;
        if (t.dataset.id && t.dataset.id !== dragSrcId) t.classList.add('drag-target');
      }

      function onDragLeave(e) { e.currentTarget.classList.remove('drag-target'); }

      function onDrop(e) {
        e.preventDefault();
        const t = e.currentTarget;
        t.classList.remove('drag-target');
        const tid = t.dataset.id;
        if (!tid || tid === dragSrcId) return;
        const si = shortcuts.findIndex(s => s.id === dragSrcId);
        const ti = shortcuts.findIndex(s => s.id === tid);
        if (si === -1 || ti === -1) return;
        const [m] = shortcuts.splice(si, 1);
        shortcuts.splice(ti, 0, m);
        renderGrid();
        persistOrder();
      }

      function onDragEnd(e) {
        e.currentTarget.classList.remove('is-dragging');
        document.querySelectorAll('.tile.drag-target').forEach(t => t.classList.remove('drag-target'));
        dragSrcId = null;
      }

      async function persistOrder() {
        try {
          const r = await fetch('/api/shortcuts/reorder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(shortcuts.map(s => s.id)),
          });
          if (!r.ok) throw new Error();
        } catch { showToast('Could not save order'); }
      }

      /* ================================================================== */
      /* Background picker                                                   */
      /* ================================================================== */

      const PRESETS = [
        { name: 'Forest',    c1: '#2c3928', c2: '#1b2619', angle: 135 },
        { name: 'Midnight',  c1: '#1c1c2e', c2: '#111120', angle: 135 },
        { name: 'Slate',     c1: '#252830', c2: '#171a22', angle: 135 },
        { name: 'Wine',      c1: '#2d1b2e', c2: '#190e1a', angle: 135 },
        { name: 'Ocean',     c1: '#162438', c2: '#0d1825', angle: 135 },
        { name: 'Mocha',     c1: '#2e2218', c2: '#1c150e', angle: 135 },
        { name: 'Ash',       c1: '#282828', c2: '#161616', angle: 135 },
        { name: 'Evergreen', c1: '#182e20', c2: '#0e1d14', angle: 135 },
      ];

      function applyBackground(c1, c2, angle, save = false) {
        const r = document.documentElement;
        r.style.setProperty('--bg1', c1);
        r.style.setProperty('--bg2', c2);
        r.style.setProperty('--bg-angle', angle + 'deg');

        /* Trigger button shows the current gradient */
        document.getElementById('bgTrigger').style.background =
          `linear-gradient(${angle}deg, ${c1}, ${c2})`;

        /* Recompute all contrast-sensitive tokens */
        updateContrast(c1, c2);

        if (save) debouncedSave(c1, c2, angle);
      }

      let saveTimer;
      function debouncedSave(c1, c2, angle) {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveBackground(c1, c2, angle), 450);
      }

      async function saveBackground(c1, c2, angle) {
        settings = { bgColor1: c1, bgColor2: c2, bgAngle: angle };
        try {
          const r = await fetch('/api/settings', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(settings),
          });
          if (!r.ok) throw new Error();
        } catch { showToast('Could not save background'); }
      }

      function renderPresets() {
        const c = document.getElementById('bgPresets');
        PRESETS.forEach((p, i) => {
          const sw = document.createElement('button');
          sw.className = 'preset-swatch';
          sw.style.background = `linear-gradient(135deg,${p.c1},${p.c2})`;
          sw.title = p.name;
          sw.addEventListener('click', () => {
            settings = { bgColor1: p.c1, bgColor2: p.c2, bgAngle: p.angle };
            applyBackground(p.c1, p.c2, p.angle);
            saveBackground(p.c1, p.c2, p.angle);
            syncPanel();
          });
          c.appendChild(sw);
        });
      }

      function syncPanel() {
        const { bgColor1: c1, bgColor2: c2, bgAngle: angle } = settings;

        document.getElementById('swatch1').style.background = c1;
        document.getElementById('swatch2').style.background = c2;
        document.getElementById('picker1').value = c1;
        document.getElementById('picker2').value = c2;
        document.getElementById('hex1').value = c1;
        document.getElementById('hex2').value = c2;

        document.querySelectorAll('.preset-swatch').forEach((el, i) => {
          el.classList.toggle('active', PRESETS[i].c1 === c1 && PRESETS[i].c2 === c2);
        });

        document.querySelectorAll('.angle-btn').forEach(btn => {
          btn.classList.toggle('active', parseInt(btn.dataset.angle) === angle);
        });
      }

      /* Panel open / close */
      function togglePanel() {
        const p = document.getElementById('bgPanel');
        if (p.style.display === 'none') { p.style.display = ''; syncPanel(); }
        else p.style.display = 'none';
      }

      document.getElementById('bgTrigger').addEventListener('click', togglePanel);
      document.getElementById('bgPanelClose').addEventListener('click', () => {
        document.getElementById('bgPanel').style.display = 'none';
      });

      document.addEventListener('click', e => {
        const panel   = document.getElementById('bgPanel');
        const trigger = document.getElementById('bgTrigger');
        if (panel.style.display !== 'none' &&
            !panel.contains(e.target) && !trigger.contains(e.target)) {
          panel.style.display = 'none';
        }
      });

      /* Color pickers */
      function onPicker1(v) {
        settings.bgColor1 = v;
        document.getElementById('swatch1').style.background = v;
        document.getElementById('hex1').value = v;
        applyBackground(settings.bgColor1, settings.bgColor2, settings.bgAngle, true);
        syncPanel();
      }

      function onPicker2(v) {
        settings.bgColor2 = v;
        document.getElementById('swatch2').style.background = v;
        document.getElementById('hex2').value = v;
        applyBackground(settings.bgColor1, settings.bgColor2, settings.bgAngle, true);
        syncPanel();
      }

      document.getElementById('picker1').addEventListener('input', e => onPicker1(e.target.value));
      document.getElementById('picker2').addEventListener('input', e => onPicker2(e.target.value));

      const validHex = s => /^#[0-9a-fA-F]{6}$/.test(s);

      document.getElementById('hex1').addEventListener('input', e => {
        if (!validHex(e.target.value)) return;
        document.getElementById('picker1').value = e.target.value;
        onPicker1(e.target.value);
      });

      document.getElementById('hex2').addEventListener('input', e => {
        if (!validHex(e.target.value)) return;
        document.getElementById('picker2').value = e.target.value;
        onPicker2(e.target.value);
      });

      /* Angle buttons */
      document.getElementById('angleRow').addEventListener('click', e => {
        const btn = e.target.closest('.angle-btn');
        if (!btn) return;
        settings.bgAngle = parseInt(btn.dataset.angle);
        applyBackground(settings.bgColor1, settings.bgColor2, settings.bgAngle, true);
        syncPanel();
      });

      /* ================================================================== */
      /* Add / Edit modal                                                    */
      /* ================================================================== */

      let editingId = null;

      const editModal  = document.getElementById('editModal');
      const modalTitle = document.getElementById('modalTitle');
      const inputName  = document.getElementById('inputName');
      const inputUrl   = document.getElementById('inputUrl');
      const btnSave    = document.getElementById('btnSave');

      function openAdd() {
        editingId = null;
        modalTitle.textContent = 'Add Shortcut';
        inputName.value = '';
        inputUrl.value  = '';
        btnSave.textContent = 'Add';
        editModal.style.display = 'flex';
        requestAnimationFrame(() => inputName.focus());
      }

      function openEdit(id) {
        const sc = shortcuts.find(s => s.id === id);
        if (!sc) return;
        editingId = id;
        modalTitle.textContent = 'Edit Shortcut';
        inputName.value = sc.name;
        inputUrl.value  = sc.url;
        btnSave.textContent = 'Save';
        editModal.style.display = 'flex';
        requestAnimationFrame(() => inputName.focus());
      }

      function closeEdit() { editModal.style.display = 'none'; editingId = null; }

      document.getElementById('btnCancel').addEventListener('click', closeEdit);
      editModal.addEventListener('click', e => { if (e.target === editModal) closeEdit(); });
      btnSave.addEventListener('click', saveShortcut);

      async function saveShortcut() {
        const name = inputName.value.trim();
        const url  = inputUrl.value.trim();
        if (!name) { inputName.focus(); return; }
        if (!url)  { inputUrl.focus();  return; }
        btnSave.disabled = true;
        try {
          if (editingId) {
            const r = await fetch('/api/shortcuts/' + editingId, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, url }),
            });
            if (!r.ok) throw new Error(await r.text());
            const sc = shortcuts.find(s => s.id === editingId);
            if (sc) { sc.name = name; sc.url = url; }
          } else {
            const r = await fetch('/api/shortcuts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, url }),
            });
            if (!r.ok) throw new Error(await r.text());
            shortcuts.push(await r.json());
          }
          closeEdit();
          renderGrid();
          showToast(editingId ? 'Shortcut updated' : 'Shortcut added');
        } catch (err) {
          showToast('Error: ' + err.message);
        } finally {
          btnSave.disabled = false;
        }
      }

      /* ================================================================== */
      /* Delete confirm                                                      */
      /* ================================================================== */

      let deletingId = null;

      const confirmModal = document.getElementById('confirmModal');
      const confirmName  = document.getElementById('confirmName');

      function openConfirm(id, name) {
        deletingId = id;
        confirmName.textContent = name;
        confirmModal.style.display = 'flex';
        requestAnimationFrame(() => document.getElementById('btnConfirmCancel').focus());
      }

      function closeConfirm() { confirmModal.style.display = 'none'; deletingId = null; }

      document.getElementById('btnConfirmCancel').addEventListener('click', closeConfirm);
      confirmModal.addEventListener('click', e => { if (e.target === confirmModal) closeConfirm(); });

      document.getElementById('btnConfirmDel').addEventListener('click', async () => {
        if (!deletingId) return;
        const id = deletingId;
        closeConfirm();
        try {
          const r = await fetch('/api/shortcuts/' + id, { method: 'DELETE' });
          if (!r.ok) throw new Error(await r.text());
          shortcuts = shortcuts.filter(s => s.id !== id);
          renderGrid();
          showToast('Shortcut removed');
        } catch (err) { showToast('Error: ' + err.message); }
      });

      /* ================================================================== */
      /* Toast                                                               */
      /* ================================================================== */

      const toastEl = document.getElementById('toast');
      let toastTimer;

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 2600);
      }

      /* ================================================================== */
      /* Keyboard                                                            */
      /* ================================================================== */

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          closeEdit();
          closeConfirm();
          document.getElementById('bgPanel').style.display = 'none';
        }
        if (e.key === 'Enter' && editModal.style.display !== 'none') saveShortcut();
      });

      /* ================================================================== */
      /* Boot                                                                */
      /* ================================================================== */

      renderPresets();

      /*
       * Apply the persisted background immediately — this also fires
       * updateContrast() so text/UI tokens are correct from the first paint.
       */
      applyBackground(settings.bgColor1, settings.bgColor2, settings.bgAngle);

      renderGrid();
    </script>
  </body>
</html>
